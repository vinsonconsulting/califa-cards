# Repo config consumed by `skillcard build` (SPEC.md section C). discover.py
# resolves the nearest .skillcard.toml walking up from the skill dir; in a real
# cabinet this sits at the repo root and is shared by every skill.
owner = "@vinsonconsulting"
tier = "public"
url = "https://github.com/vinsonconsulting/jims-filing-cabinet-of-claude-skills"
license = "MIT"
# The SkillSpector pin the project gates against (pyproject's scan extra). Takes
# precedence over the report's self-reported version for scan.tool.
scan_tool = "skillspector@a5092dd"
